services:
  ocr-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ocr-system:latest
    container_name: ocr-api
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Persist uploaded files and extracted assets across restarts
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=${WORKERS:-4}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-90}
      - OCR_MAX_DIM=${OCR_MAX_DIM:-1200}
      - OCR_MIN_DIM=${OCR_MIN_DIM:-600}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - UPLOAD_DIR=uploads
      - OUTPUT_DIR=outputs
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      start_period: 90s # allow time for OCR warm-up
      retries: 3
    # Resource limits — adjust for your deployment machine
    deploy:
      resources:
        limits:
          memory: 4G # 4 workers × ~500MB model + overhead
        reservations:
          memory: 2G
