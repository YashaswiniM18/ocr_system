services:
  - type: web
    name: etherxvision-backend
    env: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: OCR_MAX_DIM
        value: 800
      - key: WORKERS
        value: 1

  - type: static_site
    name: etherxvision-frontend
    env: static
    branch: main
    buildCommand: cd ocr-frontend && npm install && npm run build
    staticPublishPath: ocr-frontend/dist
